<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700;800&family=Inter:wght@400;700;800;900&family=Roboto:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Studio</p>
          <h1>Website Builder</h1>
        </div>
        <div class="topbar-actions">
          <button class="icon-button" id="undoBtn" type="button" title="Undo" aria-label="Undo">↶</button>
          <button class="icon-button" id="redoBtn" type="button" title="Redo" aria-label="Redo">↷</button>
          <button class="command-button" id="saveBtn" type="button">Save</button>
          <button class="command-button primary" id="exportBtn" type="button">Export</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="panel editor-panel" aria-label="Website controls">
          <section class="control-section">
            <div class="section-heading">
              <p class="eyebrow">Identity</p>
              <h2>Brand</h2>
            </div>
            <label class="field">
              <span>Site name</span>
              <input id="siteTitle" type="text" maxlength="42" />
            </label>
            <label class="field">
              <span>Tagline</span>
              <textarea id="tagline" rows="3" maxlength="160"></textarea>
            </label>
          </section>

          <section class="control-section">
            <div class="section-heading">
              <p class="eyebrow">Look</p>
              <h2>Theme</h2>
            </div>
            <div class="theme-grid" id="paletteChoices" role="radiogroup" aria-label="Color palette"></div>
            <label class="field compact">
              <span>Typeface</span>
              <select id="fontChoice">
                <option value="Inter">Inter</option>
                <option value="Roboto">Roboto</option>
                <option value="EB Garamond">EB Garamond</option>
                <option value="Georgia">Georgia</option>
                <option value="Verdana">Verdana</option>
                <option value="Trebuchet MS">Trebuchet MS</option>
              </select>
            </label>
            <label class="field compact">
              <span>Secondary typeface</span>
              <select id="secondaryFontChoice">
                <option value="Inter">Inter</option>
                <option value="Roboto">Roboto</option>
                <option value="EB Garamond">EB Garamond</option>
                <option value="Georgia">Georgia</option>
                <option value="Verdana">Verdana</option>
                <option value="Trebuchet MS">Trebuchet MS</option>
              </select>
            </label>
            <label class="range-field">
              <span>Corner radius</span>
              <input id="radiusControl" type="range" min="0" max="18" step="1" />
            </label>
          </section>

          <section class="control-section">
            <div class="section-heading row">
              <div>
                <p class="eyebrow">Structure</p>
                <h2>Sections</h2>
              </div>
              <button class="icon-button" id="addSectionBtn" type="button" title="Add section" aria-label="Add section">+</button>
            </div>
            <div class="section-list" id="sectionList"></div>
          </section>
        </aside>

        <section class="preview-stage" aria-label="Live website preview">
          <div class="preview-toolbar">
            <div class="segmented" role="tablist" aria-label="Preview size">
              <button class="segment active" data-view="desktop" type="button">Desktop</button>
              <button class="segment" data-view="mobile" type="button">Mobile</button>
            </div>
            <span id="statusText" class="status-text">Ready</span>
          </div>
          <div class="preview-frame desktop" id="previewFrame">
            <article class="site-preview" id="sitePreview"></article>
          </div>
        </section>

        <aside class="panel inspector-panel" aria-label="Section inspector">
          <section class="control-section">
            <div class="section-heading">
              <p class="eyebrow">Inspector</p>
              <h2 id="inspectorTitle">Hero</h2>
            </div>
            <label class="field compact">
              <span>Layout</span>
              <select id="layoutChoice">
                <option value="hero">Hero</option>
                <option value="text">Text</option>
                <option value="feature">Fullbleed</option>
                <option value="split">Split</option>
                <option value="quote">Quote</option>
                <option value="stats">Facts</option>
                <option value="image">Image</option>
                <option value="accordion">Accordion</option>
                <option value="gallery">Gallery</option>
                <option value="cards">Cards</option>
                <option value="video">Video</option>
              </select>
            </label>
            <label class="field compact">
              <span>Section label</span>
              <input id="sectionLabel" type="text" maxlength="42" />
            </label>
            <label class="field">
              <span>Heading</span>
              <input id="sectionHeading" type="text" maxlength="58" />
            </label>
            <label class="field" id="sectionBodyField">
              <span>Body</span>
              <textarea id="sectionBody" rows="6" maxlength="320"></textarea>
            </label>
            <label class="field" id="buttonTextField" hidden>
              <span>Button text</span>
              <input id="buttonText" type="text" maxlength="36" />
            </label>
            <label class="field" id="videoUrlField" hidden>
              <span>Video URL</span>
              <input id="videoUrl" type="url" placeholder="YouTube or Vimeo URL" />
            </label>
            <label class="field image-upload-field" id="imageUploadField" hidden>
              <span>Image</span>
              <input id="imageUpload" type="file" accept="image/*" />
              <small id="imageStatus">No image selected</small>
            </label>
            <div class="gallery-image-list" id="imagePreview" hidden></div>
            <label class="field image-upload-field" id="heroImageUploadField" hidden>
              <span>Hero image</span>
              <input id="heroImageUpload" type="file" accept="image/*" />
              <small id="heroImageStatus">Using default image</small>
            </label>
            <div class="gallery-image-list" id="heroImagePreview" hidden></div>
            <fieldset class="radio-field" id="heroImagePositionField" hidden>
              <legend>Image position</legend>
              <label>
                <input type="radio" name="heroImagePosition" value="left" />
                <span>Left</span>
              </label>
              <label>
                <input type="radio" name="heroImagePosition" value="right" />
                <span>Right</span>
              </label>
            </fieldset>
            <fieldset class="radio-field" id="quoteColorField" hidden>
              <legend>Quote color</legend>
              <label>
                <input type="radio" name="quoteColor" value="white" />
                <span>White</span>
              </label>
              <label>
                <input type="radio" name="quoteColor" value="blue" />
                <span>Blue</span>
              </label>
              <label>
                <input type="radio" name="quoteColor" value="red" />
                <span>Red</span>
              </label>
            </fieldset>
            <div class="accordion-editor" id="accordionEditor" hidden>
              <div class="section-heading row">
                <div>
                  <p class="eyebrow">Accordion</p>
                  <h2>Items</h2>
                </div>
                <button class="icon-button" id="addAccordionItemBtn" type="button" title="Add item" aria-label="Add accordion item">+</button>
              </div>
              <div class="accordion-item-editor-list" id="accordionItemEditorList"></div>
            </div>
            <div class="gallery-editor" id="galleryEditor" hidden>
              <div class="section-heading">
                <p class="eyebrow">Gallery</p>
                <h2>Images</h2>
              </div>
              <label class="field">
                <span>Add images</span>
                <input id="galleryUpload" type="file" accept="image/*" multiple />
                <small>Select one or more images for this gallery.</small>
              </label>
              <div class="gallery-image-list" id="galleryImageList"></div>
            </div>
            <div class="cards-editor" id="cardsEditor" hidden>
              <div class="section-heading row">
                <div>
                  <p class="eyebrow">Cards</p>
                  <h2>Items</h2>
                </div>
                <button class="icon-button" id="addCardItemBtn" type="button" title="Add card" aria-label="Add card">+</button>
              </div>
              <fieldset class="radio-field" id="cardColumnsField">
                <legend>Cards across</legend>
                <label>
                  <input type="radio" name="cardColumns" value="2" />
                  <span>2</span>
                </label>
                <label>
                  <input type="radio" name="cardColumns" value="3" />
                  <span>3</span>
                </label>
              </fieldset>
              <div class="card-item-editor-list" id="cardItemEditorList"></div>
            </div>
            <label class="toggle-row">
              <span>Visible</span>
              <input id="visibleToggle" type="checkbox" />
            </label>
            <button class="danger-button" id="removeSectionBtn" type="button">Remove section</button>
          </section>

          <section class="control-section export-section">
            <div class="section-heading">
              <p class="eyebrow">Output</p>
              <h2>HTML</h2>
            </div>
            <textarea id="exportCode" rows="12" readonly spellcheck="false"></textarea>
          </section>
        </aside>
      </main>
    </div>

    <template id="sectionItemTemplate">
      <button class="section-item" type="button">
        <span class="section-item-title"></span>
        <span class="section-item-kind"></span>
      </button>
    </template>

    <script src="script.js"></script>
  </body>
</html>
